name: Build & Release APK

on:
  push:
    tags:
      - 'v*' # Push events to matching v*, i.e. v1.0, v2.0

permissions:
  contents: write

jobs:
  build:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.29.0' # Matches your environment

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/app-release.apk
          name: ZynkChat ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          body: |
            ### 🚀 ZynkChat ${{ github.ref_name }} 
            
            **Features & Improvements:**
            - ✨ Modern Dark UI with Premium Typography (Outfit)
            - 🔐 Secure JWT Authentication (Access + Refresh)
            - 🕵️ User Discovery & Global Search
            - ⚡ Live Real-time Backend Integration
            
            **Technical Notes:**
            - Built with Flutter 3.29 & Riverpod 3.0
            - Optimized Release APK
            
            *If you face issues starting the app, please check your network connection to the backend API.*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
